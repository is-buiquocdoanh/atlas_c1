controller_server:
  ros__parameters:
    controller_frequency: 20.0
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.5
    min_theta_velocity_threshold: 0.001
    failure_tolerance: 0.3
    progress_checker_plugin: "progress_checker"
    goal_checker_plugins: ["general_goal_checker"] # "precise_goal_checker"
    controller_plugins: ["FollowPath"]

    # Progress checker parameters
    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.3
      movement_time_allowance: 10.0
    # Goal checker parameters
    #precise_goal_checker:
    #  plugin: "nav2_controller::SimpleGoalChecker"
    #  xy_goal_tolerance: 0.25
    #  yaw_goal_tolerance: 0.25
    #  stateful: True
    general_goal_checker:
      stateful: True
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.2
      yaw_goal_tolerance: 0.2
    # DWB parameters
    FollowPath:
      # plugin: "nav2_rotation_shim_controller::RotationShimController"
      # primary_controller: "nav2_mppi_controller::MPPIController"
      # angular_dist_threshold: 0.785
      # forward_sampling_distance: 0.6
      # rotate_to_heading_angular_vel: 1.8
      # max_angular_accel: 2.0
      # simulate_ahead_time: 1.0
      # rotate_to_goal_heading: false
      plugin: "nav2_mppi_controller::MPPIController"
      time_steps: 35 # số bước thời gian cho mô hình dự đoán, horizon(tầm nhìn tương lai)= time_steps*model_dt
      model_dt: 0.05 # bước thời gian của mô hình dự đoán =1/controller_frequency
      batch_size: 3000 # số lượng mẫu đường đi tiềm năng được đánh giá trong mỗi lần lập kế hoạch
      iteration_count: 1 # số lần lặp lại quá trình lập kế hoạch MPPI trong mỗi chu kỳ điều khiển, thường được đặt thành 1 để cân bằng giữa hiệu suất và khả năng phản hồi của robot.
      temperature: 0.3 # tham số điều chỉnh độ ngẫu nhiên của quá trình lập kế hoạch MPPI
      gamma: 0.015 # hệ số giảm giá trong MPPI, ảnh hưởng đến cách robot đánh giá chi phí của các đường đi tiềm năng trong tương lai, giúp robot ưu tiên các hành động ngắn hạn hơn hoặc dài hạn hơn tùy thuộc vào giá trị được đặt.
      prune_distance: 1.7 # khoảng cách mà MPPI sẽ cắt bỏ các đường đi tiềm năng không còn phù hợp với vị trí hiện tại của robot, giúp cải thiện hiệu suất lập kế hoạch bằng cách tập trung vào các đường đi có khả năng thực hiện được hơn.
      transform_tolerance: 0.2 # thời gian tối đa (tính bằng giây) mà MPPI sẽ chờ đợi để nhận được các phép biến đổi cần thiết giữa các khung tham chiếu, giúp đảm bảo rằng robot có thông tin chính xác về vị trí và hướng của nó khi lập kế hoạch đường đi.
      vx_std: 0.3 # Độ lệch chuẩn cho tốc độ tuyến tính theo trục x, giúp robot đánh giá nhiều đường cong tiềm năng hơn, cải thiện khả năng lập kế hoạch và tránh chướng ngại vật của robot, đặc biệt là trong môi trường có nhiều chướng ngại vật hoặc khi robot có kích thước lớn.
      vy_std: 0.0
      wz_std: 0.3 
      vx_max: 0.4
      vx_min: 0.0
      vy_max: 0.0 
      wz_max: 0.7
      ax_max: 1.0    # Gia tốc tuyến tính tối đa (m/s²) 
      ax_min: -2.0   # Gia tốc tuyến tính tối thiểu (m/s²) - cho phép lùi
      az_max: 1.0    # Gia tốc góc tối đa (rad/s²)
      az_min: -1.0   # Gia tốc góc tối thiểu (rad/s²)
      motion_model: "DiffDrive"
      visualize: false
      critics: ["ObstaclesCritic","ConstraintCritic", "CostCritic", "GoalCritic", "GoalAngleCritic", "PathAlignCritic", "PathFollowCritic", "PathAngleCritic", "PreferForwardCritic"]
      ObstaclesCritic:
        enabled: true
        cost_power: 1 # Số mũ của hàm chi phí.Nếu tăng lên 2 hoặc 3: Chi phí sẽ tăng vọt (theo đường cong) khi lại gần. Điều này giúp robot chạy thoải mái ở xa nhưng "phanh cực gắt" khi đến gần.
        repulsion_weight: 1.5 # Đây là lực đẩy. Nó tạo ra một vùng chi phí giảm dần xung quanh vật cản. Trọng số này càng cao, robot càng có xu hướng giữ khoảng cách xa vật cản.
        critical_weight: 20.0 # trọng số này sẽ áp đặt một mức phạt rất nặng để ép robot phải phanh gấp hoặc bẻ lái ngay lập tức
        consider_footprint: false
        collision_cost: 10000.0 # Với con số 10,000, MPPI sẽ gần như loại bỏ hoàn toàn các quỹ đạo đó khỏi lựa chọn.
        collision_margin_distance: 0.1 # bất kỳ điểm nào nằm trong khoảng này sẽ được oi là va chạm
        near_goal_distance: 0.5 # Khi robot ở gần mục tiêu, nó có thể chấp nhận rủi ro hơn để đạt được mục tiêu nhanh hơn. Khoảng cách này xác định khi nào điều đó xảy ra.
        inflation_radius: 0.3 # (only in Humble)
        cost_scaling_factor: 10.0 # (only in Humble)   
      ConstraintCritic:
        enabled: true
        cost_power: 1
        cost_weight: 4.0
      GoalCritic:
        enabled: true
        cost_power: 1
        cost_weight: 5.0
        threshold_to_consider: 1.4
      GoalAngleCritic:
        enabled: true
        cost_power: 1
        cost_weight: 3.0
        threshold_to_consider: 0.5
      PathAlignCritic:
        enabled: true
        cost_power: 1
        cost_weight: 4.0
        threshold_to_consider: 1.2
      PathFollowCritic:
        enabled: true
        cost_power: 1
        cost_weight: 9.0
        threshold_to_consider: 0.5
      PathAngleCritic:
        enabled: true
        cost_power: 1
        cost_weight: 2.0
      PreferForwardCritic:
        enabled: true
        cost_power: 1
        cost_weight: 2.0
        forward_bias: 0.75

local_costmap:
  local_costmap:
    ros__parameters:
      update_frequency: 30.0
      publish_frequency: 10.0
      global_frame: odom
      robot_base_frame: base_link
      rolling_window: true
      width: 5
      height: 5
      resolution: 0.05
      footprint: "[ [0.4, 0.205], [-0.4, 0.205], [-0.4, -0.205], [0.4, -0.205] ]"
      plugins: ["obstacle_layer", "voxel_layer", "keepout_filter", "inflation_layer"]
      keepout_filter:
        plugin: "nav2_costmap_2d::KeepoutFilter"
        enabled: True
        filter_info_topic: "/keepout_filter_info"
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 10.0
        inflation_radius: 0.35
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: True
        observation_sources: scan
        scan:
          topic: /atlas/scan_filtered
          max_obstacle_height: 2.0
          clearing: True
          marking: True
          data_type: "LaserScan"
      voxel_layer:
        plugin: "nav2_costmap_2d::VoxelLayer"
        enabled: True
        publish_voxel_map: True
        origin_z: 0.0
        z_resolution: 0.05
        z_voxels: 16
        max_obstacle_height: 2.0
        mark_threshold: 0
        observation_sources: scan
        scan:
          topic: /atlas/scan_filtered
          max_obstacle_height: 2.0
          clearing: True
          marking: True
          data_type: "LaserScan"
          raytrace_max_range: 5.0 # tầm xa xóa vết tích chướng ngại vật
          raytrace_min_range: 0.0
          obstacle_max_range: 4.0 # tầm xa đánh dâu chướng ngại vật
          obstacle_min_range: 0.0
      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: True
      always_send_full_costmap: True

global_costmap:
  global_costmap:
    ros__parameters:
      footprint_padding: 0.03
      update_frequency: 1.0
      publish_frequency: 1.0
      global_frame: map
      robot_base_frame: base_link
      footprint: "[ [0.4, 0.205], [-0.4, 0.205], [-0.4, -0.205], [0.4, -0.205] ]"
      resolution: 0.05
      plugins: ["static_layer", "obstacle_layer", "voxel_layer", "keepout_filter", "speed_filter", "inflation_layer"]
      keepout_filter:
        plugin: "nav2_costmap_2d::KeepoutFilter"
        enabled: True
        filter_info_topic: "/keepout_filter_info"
      speed_filter:
        plugin: "nav2_costmap_2d::SpeedFilter"
        enabled: True
        filter_info_topic: "/speed_filter_info"
        speed_limit_topic: "/speed_limit"
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: True
        observation_sources: scan
        footprint_clearing_enabled: true
        max_obstacle_height: 2.0
        combination_method: 1
        scan:
          topic: /atlas/scan_filtered
          obstacle_max_range: 2.5
          obstacle_min_range: 0.0
          raytrace_max_range: 3.0
          raytrace_min_range: 0.0
          max_obstacle_height: 2.0
          min_obstacle_height: 0.0
          clearing: True
          marking: True
          data_type: "LaserScan"
          inf_is_valid: false
      
      voxel_layer:
        plugin: "nav2_costmap_2d::VoxelLayer"
        enabled: True
        footprint_clearing_enabled: true
        max_obstacle_height: 2.0
        publish_voxel_map: True
        origin_z: 0.0
        z_resolution: 0.05
        z_voxels: 16
        max_obstacle_height: 2.0
        unknown_threshold: 15
        mark_threshold: 0
        observation_sources: pointcloud
        combination_method: 1
        pointcloud:  # no frame set, uses frame from message
          topic: /intel_realsense_r200_depth/points
          max_obstacle_height: 2.0
          min_obstacle_height: 0.0
          obstacle_max_range: 2.5
          obstacle_min_range: 0.0
          raytrace_max_range: 3.0
          raytrace_min_range: 0.0
          clearing: True
          marking: True
          data_type: "PointCloud2"
          transport_type: "raw"  # raw or/ with compression (zlib, draco, zstd)
      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: True
        enabled: true
        subscribe_to_updates: true
        transform_tolerance: 0.1
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        enabled: true
        inflation_radius: 0.3
        cost_scaling_factor: 10.0
        inflate_unknown: false
        inflate_around_unknown: true
      always_send_full_costmap: True
      introspection_mode: "disabled"

map_server:
  ros__parameters:
    # Overridden in launch by the "map" launch configuration or provided default value.
    # To use in yaml, remove the default "map" value in the tb3_simulation_launch.py file & provide full path to map below.
    yaml_filename: ""

map_saver:
  ros__parameters:
    save_map_timeout: 5.0
    free_thresh_default: 0.25
    occupied_thresh_default: 0.65
    map_subscribe_transient_local: True

planner_server:
  ros__parameters:
    expected_planner_frequency: 20.0
    planner_plugins: ["GridBased"]
    GridBased:
      plugin: "nav2_navfn_planner/NavfnPlanner"
      tolerance: 0.5
      use_astar: false
      allow_unknown: true

smoother_server:
  ros__parameters:
    smoother_plugins: ["simple_smoother"]
    simple_smoother:
      plugin: "nav2_smoother::SimpleSmoother"
      tolerance: 1.0e-10
      max_its: 1000
      do_refinement: True

behavior_server:
  ros__parameters:
    costmap_topic: local_costmap/costmap_raw
    footprint_topic: local_costmap/published_footprint
    cycle_frequency: 10.0
    behavior_plugins: ["spin", "backup", "drive_on_heading", "assisted_teleop", "wait"]
    spin:
      plugin: "nav2_behaviors/Spin"
    backup:
      plugin: "nav2_behaviors/BackUp"
    drive_on_heading:
      plugin: "nav2_behaviors/DriveOnHeading"
    wait:
      plugin: "nav2_behaviors/Wait"
    assisted_teleop:
      plugin: "nav2_behaviors/AssistedTeleop"
    global_frame: odom
    robot_base_frame: base_link
    transform_tolerance: 0.1
    simulate_ahead_time: 2.0
    max_rotational_vel: 1.0
    min_rotational_vel: 0.4
    rotational_acc_lim: 3.2

robot_state_publisher:
  ros__parameters: {}

waypoint_follower:
  ros__parameters:
    loop_rate: 20
    stop_on_failure: false
    waypoint_task_executor_plugin: "wait_at_waypoint"
    wait_at_waypoint:
      plugin: "nav2_waypoint_follower::WaitAtWaypoint"
      enabled: True
      waypoint_pause_duration: 200

velocity_smoother:
  ros__parameters:
    smoothing_frequency: 20.0
    scale_velocities: False
    feedback: "OPEN_LOOP"
    max_velocity: [1.0, 0.0, 2.0] # vx, vy, wz
    min_velocity: [-1.0, 0.0, -2.0] # vx, vy, wz
    max_accel: [4.0, 0.0, 4.0] # ax, ay, az
    max_decel: [-4.0, 0.0, -4.0] # ax, ay, az
    odom_topic: "/atlas/odom"
    odom_duration: 0.1
    deadband_velocity: [0.0, 0.0, 0.0]
    velocity_timeout: 1.0
